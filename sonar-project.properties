# SonarCloud configuration — CI mode (not Automatic Analysis)
sonar.projectKey=zeffyr-000_zeffyrmusic
sonar.organization=zeffyr-000

# Sources and tests
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts

# Coverage report generated by Vitest (lcov format)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusions from coverage metrics
sonar.coverage.exclusions=\
  **/*.spec.ts,\
  src/setup-vitest.ts,\
  src/main.ts,\
  src/main.server.ts,\
  src/server.ts,\
  src/environments/**,\
  src/app/mock-test.component.ts,\
  src/app/transloco-testing.ts

# Exclusions from duplication detection
sonar.cpd.exclusions=**/*.spec.ts

# TypeScript configuration
sonar.typescript.tsconfigPaths=tsconfig.json

# Source encoding
sonar.sourceEncoding=UTF-8
