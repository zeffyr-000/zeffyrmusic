name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - master

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Required by SonarCloud for blame information and PR decoration
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.x
          cache: 'npm'

      - name: Install dependencies
        if: github.actor != 'dependabot[bot]' && !startsWith(github.head_ref, 'dependabot/')
        run: npm ci

      - name: Install dependencies (Dependabot)
        if: github.actor == 'dependabot[bot]' || startsWith(github.head_ref, 'dependabot/')
        run: npm install

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test -- --run --coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: SonarCloud analysis
        # Skipped on Dependabot PRs — repository secrets are not available to Dependabot workflows
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (e2e — for Playwright)
        run: npm run build -- --configuration e2e

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: 'true'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Build (production)
        run: |
          RELEASE="zeffyrmusic@${{ github.sha }}"
          sed -i "s/SENTRY_RELEASE: ''/SENTRY_RELEASE: '$RELEASE'/" src/environments/environment.prod.ts
          grep -q "SENTRY_RELEASE: '$RELEASE'" src/environments/environment.prod.ts || { echo "::error::Failed to inject SENTRY_RELEASE"; exit 1; }
          npm run build -- --configuration production

      - name: Upload Sentry source maps
        if: github.ref == 'refs/heads/master'
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ]; then
            echo "SENTRY_AUTH_TOKEN not set, skipping source map upload"
            exit 0
          fi
          npx @sentry/cli@2.42.2 sourcemaps upload \
            --org zeffyr \
            --project zeffyrmusic \
            --release "zeffyrmusic@${{ github.sha }}" \
            --url-prefix "~/" \
            --strip-common-prefix \
            --validate \
            dist/browser/
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Remove source maps
        run: find dist -type f -name '*.map' -delete

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 7
