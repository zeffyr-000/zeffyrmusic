@if (isBrowser) {
  <div class="toast-container" aria-live="polite" role="status">
    @for (notification of notifications(); track notification.id) {
      <ngb-toast
        [class]="getToastClass(notification)"
        [autohide]="true"
        [delay]="notification.duration ?? 5000"
        (hidden)="onToastHidden(notification)"
      >
        {{ notification.message }}
      </ngb-toast>
    }
  </div>
}
