name: Claude Code Review

on:
  pull_request:
    # "synchronize" covers every push to the PR branch, including force pushes
    types: [opened, synchronize, reopened, ready_for_review]

# Cancel a running review when a new commit is pushed to the same PR
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    # Skip drafts and Dependabot PRs: repository secrets (including the Claude
    # token) are not exposed to Dependabot runs, so the review would fail auth.
    if: >-
      github.event.pull_request.draft == false &&
      github.actor != 'dependabot[bot]' &&
      !startsWith(github.head_ref, 'dependabot/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are reviewing a pull request for Zeffyr Music, an Angular 22
            (zoneless, SSR) + TypeScript frontend.

            Before reviewing, read `AGENTS.md` (the single source of truth for the
            architecture and rules) and `.claude/commands/code-review.md` (the
            project convention checklist). Judge the diff against those conventions.
            The enumerated list below is a reminder of common cases, NOT an upper
            bound: also flag every violation of the `code-review.md` checklist, even
            if it is not repeated here.

            Review this pull request in the style of GitHub Copilot code reviews:

            **Summary comment**: start with a short summary (2-4 sentences) of what the
            PR does and your overall impression. Do not list every file exhaustively.
            If you found cross-cutting problems that do not map cleanly onto a single
            changed line (e.g. state held in a service instead of a Signal Store, an
            unbounded/never-invalidated cache, a layering violation), add a short
            "Architecture notes" list to this summary — do not drop them just because
            they do not fit an inline suggestion.

            **Inline comments**: only comment on changed lines where you found a real
            issue and you are confident about it:
            - bugs and logic errors (undefined variables, incorrect conditions,
              unhandled edge cases, regressions, wrong signal usage, subscription leaks)
            - SSR crashes: direct `window`/`document`/browser-API access without
              `isPlatformBrowser()` or `withSsrSafety()`
            - security vulnerabilities (XSS via `innerHTML` / `bypassSecurityTrust*`,
              unvalidated or unescaped input)
            - project-convention violations that are genuine defects: `any` types;
              `ChangeDetectorRef` / `markForCheck()` used with signals (zoneless OnPush
              — never needed); any mutable state field in a service (`Map`/`Record`/
              array/`BehaviorSubject`) — shared state belongs in a Signal Store;
              non-English comments; direct `Sentry.*` calls instead of `LoggingService`;
              and the CRITICAL rule that YouTube `#player` styles must stay global in
              `styles.scss`
            - concrete performance issues (heavy work in templates, needless change
              detection, unbounded subscriptions)
            - typos in code or strings

            For each inline comment: a brief explanation (1-2 sentences) and, whenever
            possible, a directly applicable code suggestion in a ```suggestion``` block.

            Avoid: style or personal-preference remarks, praise for correct code,
            speculative comments ("this could potentially..."), repeating the same issue
            on multiple lines. If the code looks good, simply say so in the summary and
            do not post any inline comment. Note: non-English comments and
            `markForCheck()`-with-signals are genuine convention defects, NOT style
            remarks — always flag them.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
