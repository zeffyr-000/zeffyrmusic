name: Claude Code Review

on:
  pull_request:
    # "synchronize" covers every push to the PR branch, including force pushes
    types: [opened, synchronize, reopened, ready_for_review]

# Cancel a running review when a new commit is pushed to the same PR
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    # Skip drafts and Dependabot PRs: repository secrets (including the Claude
    # token) are not exposed to Dependabot runs, so the review would fail auth.
    if: >-
      github.event.pull_request.draft == false &&
      github.actor != 'dependabot[bot]' &&
      !startsWith(github.head_ref, 'dependabot/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Fetch the base branch so the review rules (AGENTS.md, code-review.md, skills)
      # can be read from base instead of the PR head тАФ a PR must not be able to
      # weaken its own review rules.
      - name: Fetch base branch for authoritative review rules
        run: git fetch --depth=1 origin "${{ github.base_ref }}"

      # Escalate to a higher-reasoning model (Opus) for large or sensitive PRs;
      # keep the faster Sonnet for routine ones тАФ mirrors Copilot's effort levels.
      - name: Select review model by PR complexity
        id: model
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CHANGED=$(gh pr view "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" --json files -q '.files[].path')
          FILES=$(printf '%s\n' "$CHANGED" | grep -c . || true)
          LINES=$(( ${{ github.event.pull_request.additions }} + ${{ github.event.pull_request.deletions }} ))
          # Areas where subtle bugs are costly and deserve deeper analysis.
          SENSITIVE=$(printf '%s\n' "$CHANGED" | grep -Ec \
            'src/app/store/|src/server\.ts|styles\.scss|_custom\.scss|interceptor/|youtube-player|app\.config|with-ssr-safety' || true)
          MODEL="claude-sonnet-5"
          REASON="routine"
          if [ "${FILES:-0}" -gt 15 ] || [ "${LINES:-0}" -gt 400 ] || [ "${SENSITIVE:-0}" -gt 0 ]; then
            MODEL="claude-opus-4-8"
            REASON="complex"
          fi
          echo "model=$MODEL" >> "$GITHUB_OUTPUT"
          echo "Selected $MODEL ($REASON тАФ files=$FILES, lines=$LINES, sensitive=$SENSITIVE)"

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are reviewing a pull request for Zeffyr Music, an Angular 22
            (zoneless, SSR) + TypeScript frontend.

            Before reviewing, read the project rules from the BASE branch, not the PR
            head, so a PR cannot weaken its own review rules. Use:
              git show origin/${{ github.base_ref }}:AGENTS.md
              git show origin/${{ github.base_ref }}:.claude/commands/code-review.md
            `AGENTS.md` is the single source of truth for architecture and rules;
            `code-review.md` is the convention checklist. Judge the diff against them.
            Additionally, for each domain the diff touches, read the matching
            `.claude/skills/<name>/SKILL.md` (also from the base branch, via
            `git show origin/${{ github.base_ref }}:.claude/skills/<name>/SKILL.md`) тАФ
            these skills hold detailed rules NOT fully repeated in AGENTS.md. Map:
            CSS near the YouTube player тЖТ `css-critical-rules`; HTTP / snake_case API тЖТ
            `api-data-mapping`; SSR / hydration тЖТ `ssr-safety`; templates тЖТ
            `angular-templates`; stores тЖТ `signal-store-patterns`; SCSS тЖТ `scss-styling`;
            player/iframe тЖТ `youtube-player-lifecycle`.
            The enumerated list below is a reminder of common cases, NOT an upper
            bound: also flag every violation of the checklist or a relevant skill, even
            if it is not repeated here.

            Review this pull request in the style of GitHub Copilot code reviews:

            **Summary comment**: ALWAYS post a summary comment on the PR, even when you
            found nothing to comment on inline тАФ never end a review with zero output.
            Start with a short summary (2-4 sentences) of what the PR does and your
            overall impression. Do not list every file exhaustively.
            When the code looks good and you post no inline comments, the summary must
            still briefly state what you reviewed (the key files/areas) and why it passed
            (e.g. "conventions followed: signals, inject(), SSR guards, Transloco") so the
            author sees an explicit green review rather than silence.
            If you found cross-cutting problems that do not map cleanly onto a single
            changed line (e.g. state held in a service instead of a Signal Store, an
            unbounded/never-invalidated cache, a layering violation), add a short
            "Architecture notes" list to this summary тАФ do not drop them just because
            they do not fit an inline suggestion.

            **Excluded files**: do not review or comment on lock files, generated or
            build-output files, SVGs, or dependency manifests (e.g. `package-lock.json`,
            `package.json` version bumps) тАФ focus on hand-written source.

            **Inline comments**: only comment on changed lines where you found a real
            issue and you are confident about it:
            - bugs and logic errors (undefined variables, incorrect conditions,
              unhandled edge cases, regressions, wrong signal usage, subscription leaks)
            - SSR crashes: direct `window`/`document`/browser-API access without
              `isPlatformBrowser()` or `withSsrSafety()`
            - security vulnerabilities (XSS via `innerHTML` / `bypassSecurityTrust*`,
              unvalidated or unescaped input, hardcoded secrets / API keys / tokens
              committed in source or config)
            - project-convention violations that are genuine defects: `any` types;
              `ChangeDetectorRef` / `markForCheck()` used with signals (zoneless OnPush
              тАФ never needed); any mutable state field in a service (`Map`/`Record`/
              array/`BehaviorSubject`) тАФ shared state belongs in a Signal Store;
              non-English comments; user-facing text hard-coded in templates/components
              instead of Transloco (`| transloco` / `TranslocoService`); hard-coded
              colors/spacing/font-size in SCSS instead of `_custom.scss` design tokens;
              direct `Sentry.*` calls instead of `LoggingService`; and the CRITICAL rule
              that YouTube `#player` styles must stay global in `styles.scss`
            - concrete performance issues (heavy work in templates, needless change
              detection, unbounded subscriptions)
            - typos in code or strings

            For each inline comment: a brief explanation (1-2 sentences) and, whenever
            possible, a directly applicable code suggestion in a ```suggestion``` block.

            Avoid (in INLINE comments): style or personal-preference remarks, praise for
            correct code, speculative comments ("this could potentially..."), repeating
            the same issue on multiple lines. If the code looks good, post no inline
            comment тАФ but still post the green summary comment described above. Note: non-English comments and
            `markForCheck()`-with-signals are genuine convention defects, NOT style
            remarks тАФ always flag them.

          claude_args: |
            --model ${{ steps.model.outputs.model }}
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(git show:*)"
